<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; font-src data:; connect-src 'none';">
<title>Mermaid SVG サニタイズ 前後比較</title>
<style>
:root {
  --paper: #f4efe6;
  --paper-soft: #ede6d9;
  --ink: #2b2a28;
  --ink-soft: #57534e;
  --ink-mute: #8a8379;
  --accent: #b4533a;
  --rule: #d5cebf;
  --f-display: "DM Serif Display", "Shippori Mincho", ui-serif, serif;
  --f-body: "Shippori Mincho", "Noto Serif JP", ui-serif, serif;
  --f-mono: "Space Mono", ui-monospace, SFMono-Regular, "Courier New", monospace;
  --r-sm: 2px;
  --r-md: 4px;
  --r-lg: 8px;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 14px;
  line-height: 1.6;
  padding: 16px;
}

h2.demo-title {
  font-family: var(--f-display);
  font-size: 22px;
  font-weight: 400;
  margin: 0 0 8px;
  color: var(--ink);
}
p.demo-desc { margin: 0 0 16px; color: var(--ink-soft); font-size: 13px; }
.ba-wrap {
  position: relative;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 0;
  margin: 16px 0;
  overflow: hidden;
  user-select: none;
}
.ba-panel {
  padding: 24px;
  min-height: 180px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
}
.ba-after {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--paper);
  clip-path: inset(0 50% 0 0);
  transition: clip-path 0.05s linear;
}
.ba-label {
  position: absolute;
  top: 10px;
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--ink-mute);
  text-transform: uppercase;
}
.ba-label.before { right: 12px; }
.ba-label.after { left: 12px; color: var(--accent); }
.ba-divider {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 2px;
  background: var(--accent);
  cursor: ew-resize;
  z-index: 2;
}
.ba-divider::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  border: 2px solid var(--accent);
  background: var(--paper);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}
input.ba-range {
  position: absolute;
  top: 0; bottom: 0; left: 0; right: 0;
  width: 100%;
  margin: 0;
  opacity: 0;
  cursor: ew-resize;
  z-index: 3;
}

</style>
</head>
<body>
<p class="demo-desc">中央のスライダーを左右にドラッグしてください。class 属性を剥がすと Mermaid の &lt;style&gt; セレクタが当たらず真っ黒に潰れます（左）。SVG 系タグは class を素通しにすると、配色と線幅が正しく復活します（右）。</p>

<h2 class="demo-title">Mermaid SVG サニタイズ 前後比較</h2>
<div class="ba-wrap">
  <div class="ba-panel ba-before"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 260 120' role='img' aria-label='class を剥がされて真っ黒に崩れた Mermaid フローチャート' style='width:100%;max-width:420px;height:auto;display:block;margin:0 auto;'><defs><marker id='arrow-before' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='5' markerHeight='5' orient='auto-start-reverse'><path d='M0,0 L10,5 L0,10 z' fill='#000'/></marker></defs><line x1='56' y1='60' x2='102' y2='60' stroke='#000' stroke-width='20' marker-end='url(#arrow-before)'/><line x1='158' y1='60' x2='204' y2='60' stroke='#000' stroke-width='20' marker-end='url(#arrow-before)'/><rect x='16' y='40' width='40' height='40' fill='#000'/><rect x='110' y='40' width='40' height='40' fill='#000'/><rect x='204' y='40' width='40' height='40' fill='#000'/><text x='36' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#000'>A</text><text x='130' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#000'>B</text><text x='224' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#000'>C</text></svg></div>
  <div class="ba-after">
    <div class="ba-panel"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 260 120' role='img' aria-label='class が保持されて正常に描画された Mermaid フローチャート' style='width:100%;max-width:420px;height:auto;display:block;margin:0 auto;'><defs><marker id='arrow-after' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='6' markerHeight='6' orient='auto-start-reverse'><path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker></defs><line x1='56' y1='60' x2='108' y2='60' stroke='#333' stroke-width='1.5' marker-end='url(#arrow-after)'/><line x1='158' y1='60' x2='210' y2='60' stroke='#333' stroke-width='1.5' marker-end='url(#arrow-after)'/><rect x='16' y='40' width='40' height='40' rx='4' fill='#ECECFF' stroke='#333' stroke-width='1'/><rect x='110' y='40' width='40' height='40' rx='4' fill='#ECECFF' stroke='#333' stroke-width='1'/><rect x='204' y='40' width='40' height='40' rx='4' fill='#ECECFF' stroke='#333' stroke-width='1'/><text x='36' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#333'>A</text><text x='130' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#333'>B</text><text x='224' y='65' font-family='sans-serif' font-size='14' text-anchor='middle' fill='#333'>C</text></svg></div>
  </div>
  <div class="ba-label before">Before (class stripped)</div>
  <div class="ba-label after">After (class preserved)</div>
  <div class="ba-divider" id="ba-divider"></div>
  <input class="ba-range" type="range" min="0" max="100" value="50" id="ba-range" aria-label="スライダー">
</div>
<script>
(function () {
  function report() {
    try {
      var h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight
      );
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'tsutsu-demo-height', value: h }, '*');
      }
    } catch (e) { /* sandbox なので親 DOM アクセス不可、postMessage のみ */ }
  }
  if (document.readyState === 'complete') report();
  else window.addEventListener('load', report);
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(report).observe(document.body);
  }
  // アニメーション/状態変化後も少し遅延して再通知
  setTimeout(report, 100);
  setTimeout(report, 500);
})();

(function(){
  var range = document.getElementById('ba-range');
  var after = document.querySelector('.ba-after');
  var divider = document.getElementById('ba-divider');
  if (!range || !after || !divider) return;
  function apply(v){
    var p = Math.max(0, Math.min(100, Number(v)));
    after.style.clipPath = 'inset(0 ' + (100 - p) + '% 0 0)';
    divider.style.left = p + '%';
  }
  range.addEventListener('input', function(){ apply(range.value); });
  apply(range.value);
})();

</script>
</body>
</html>
